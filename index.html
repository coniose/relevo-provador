<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Relevo — Provador Espacial (cena de captura)</title>
<style>
  body{margin:0;background:#0E0F13;color:#F2EFE9;font-family:system-ui,sans-serif;overflow:hidden}
  #hud{
    position:fixed;left:16px;top:16px;z-index:5;font-size:13px;line-height:1.6;
    background:rgba(14,15,19,.7);border:1px solid rgba(242,239,233,.12);
    border-radius:12px;padding:14px 16px;max-width:320px;backdrop-filter:blur(8px)
  }
  #hud b{color:#3DD6D0}
  #hud .copper{color:#E0A877}
  #hud button{
    margin-top:10px;margin-right:8px;background:#C8743C;color:#1a1206;border:none;
    border-radius:8px;padding:9px 14px;font-weight:600;cursor:pointer;font-size:13px
  }
  #hud button.ghost{background:transparent;color:#3DD6D0;border:1px solid rgba(61,214,208,.5)}
  #stat{font-family:ui-monospace,monospace;font-size:12px;color:#7C828C;margin-top:8px}
</style>
</head>
<body>
<div id="hud">
  <b>RELEVO · cena de captura</b><br>
  No Quest: toque <span class="copper">Entrar em AR</span> e use <span class="copper">pinça</span> (indicador + polegar) para pegar a camisa.<br>
  Ao aproximar do torso, ela faz <span class="copper">cross-dissolve</span> (fica ~5% opaca) — ponto de troca pro CGI.<br>
  <div id="stat">aguardando sessão…</div>
  <button id="exportBtn" class="ghost">Exportar take (JSON)</button>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';
import { ARButton } from 'three/addons/webxr/ARButton.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------- setup ----------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.01, 20);
camera.position.set(0, 1.4, 0.6);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444455, 1.1));
const key = new THREE.DirectionalLight(0xffffff, 1.0);
key.position.set(1, 3, 1); scene.add(key);

// botão AR com hand-tracking (passthrough no Quest é o default do immersive-ar)
document.body.appendChild(ARButton.createButton(renderer, {
  requiredFeatures: ['hand-tracking'],
  optionalFeatures: ['local-floor', 'bounded-floor']
}));

// ---------- a camisa (GLB se existir, senão placeholder) ----------
const garment = new THREE.Group();
garment.position.set(0, 1.3, -0.4);
scene.add(garment);

function makeMatTransparent(obj){
  obj.traverse(c=>{ if(c.isMesh){ c.material = c.material.clone(); c.material.transparent = true; c.material.depthWrite = true; }});
}
function placeholderShirt(){
  // forma simples de camiseta preta para a cena rodar sem asset
  const mat = new THREE.MeshStandardMaterial({ color:0x111114, roughness:0.85, transparent:true });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.55, 0.10, 4,4,2), mat);
  const sleeveGeo = new THREE.BoxGeometry(0.16, 0.18, 0.09);
  const l = new THREE.Mesh(sleeveGeo, mat); l.position.set(-0.27, 0.16, 0); l.rotation.z = 0.5;
  const r = new THREE.Mesh(sleeveGeo, mat); r.position.set( 0.27, 0.16, 0); r.rotation.z = -0.5;
  body.geometry.translate(0,0,0);
  garment.add(body, l, r);
}
// normaliza qualquer GLB: centraliza na origem do grupo e ajusta a maior dimensão p/ ~0.55m
function fitGarment(obj, targetSize){
  const box = new THREE.Box3().setFromObject(obj);
  const size = new THREE.Vector3(); box.getSize(size);
  const center = new THREE.Vector3(); box.getCenter(center);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const s = targetSize / maxDim;
  obj.scale.setScalar(s);
  obj.position.sub(center.multiplyScalar(s)); // recentraliza
}
new GLTFLoader().load('./assets/tshirt.glb',
  (gltf)=>{ makeMatTransparent(gltf.scene); fitGarment(gltf.scene, 0.55); garment.add(gltf.scene); },
  undefined,
  ()=>{ placeholderShirt(); }   // sem asset → placeholder
);

// ---------- botão "Projetar" (flutua à frente no AR; tocar com o dedo projeta a camisa) ----------
function makeButtonTexture(label){
  const c = document.createElement('canvas'); c.width = 512; c.height = 200;
  const x = c.getContext('2d');
  x.fillStyle = '#C8743C';
  x.beginPath(); x.roundRect(8, 8, c.width-16, c.height-16, 36); x.fill();
  x.fillStyle = '#1a1206';
  x.font = '700 86px system-ui, sans-serif';
  x.textAlign = 'center'; x.textBaseline = 'middle';
  x.fillText(label, c.width/2, c.height/2 + 4);
  const t = new THREE.CanvasTexture(c); t.anisotropy = 4; return t;
}
const projectBtn = new THREE.Group();
{
  const mat = new THREE.MeshBasicMaterial({ map: makeButtonTexture('Projetar'), transparent:true, side:THREE.DoubleSide });
  projectBtn.add(new THREE.Mesh(new THREE.PlaneGeometry(0.20, 0.078), mat));
}
projectBtn.visible = false;
scene.add(projectBtn);

// ---------- mãos ----------
// SEM mão virtual: em passthrough você vê suas mãos reais e o celular sem oclusão.
// Só usamos os joints do hand-tracking para detectar a pinça e gravar o take.
const hands = [];
for (let i=0;i<2;i++){
  const hand = renderer.xr.getHand(i);
  scene.add(hand);
  hands.push(hand);
}
function jointPos(hand, name, target){
  const j = hand.joints?.[name];
  if (!j) return null;
  return target.setFromMatrixPosition(j.matrixWorld);
}
const _a = new THREE.Vector3(), _b = new THREE.Vector3(), _mid = new THREE.Vector3();
function pinchState(hand){
  const tip = jointPos(hand, 'index-finger-tip', _a);
  const thb = jointPos(hand, 'thumb-tip', _b);
  if (!tip || !thb) return { pinching:false };
  const d = tip.distanceTo(thb);
  _mid.copy(tip).add(thb).multiplyScalar(0.5);
  return { pinching: d < 0.025, point: _mid.clone() };
}

// ---------- grab ----------
let grabbedBy = null;       // qual mão segura
const grabOffset = new THREE.Vector3();
const GRAB_RADIUS = 0.22;

function updateGrab(){
  for (const hand of hands){
    const p = pinchState(hand);
    if (grabbedBy === hand){
      if (p.pinching && p.point){ garment.position.copy(p.point).add(grabOffset); }
      else { grabbedBy = null; }
    } else if (!grabbedBy && p.pinching && p.point){
      if (p.point.distanceTo(garment.position) < GRAB_RADIUS){
        grabbedBy = hand;
        grabOffset.copy(garment.position).sub(p.point);
      }
    }
  }
}

// ---------- distância → opacidade (cross-dissolve no torso) ----------
const torso = new THREE.Vector3();
let targetOpacity = 1;
function updateFade(){
  // estima o torso: abaixo e à frente da cabeça (câmera XR)
  const head = renderer.xr.isPresenting ? renderer.xr.getCamera() : camera;
  head.getWorldPosition(torso);
  torso.y -= 0.40; // peito ~40cm abaixo dos olhos
  const dist = garment.position.distanceTo(torso);
  const NEAR = 0.16, FAR = 0.42;
  const t = THREE.MathUtils.clamp((dist - NEAR) / (FAR - NEAR), 0, 1);
  targetOpacity = THREE.MathUtils.lerp(0.05, 1.0, t); // perto = quase invisível
  garment.traverse(c=>{
    if (c.isMesh && c.material){
      c.material.opacity = THREE.MathUtils.lerp(c.material.opacity ?? 1, targetOpacity, 0.18);
    }
  });
}

// ---------- gravador de take (dados de mão p/ o editor) ----------
let recording = false;
const take = [];
const tmpL = new THREE.Vector3(), tmpR = new THREE.Vector3();
function recordFrame(t){
  if (!recording) return;
  const frame = { t: +t.toFixed(1), opacity:+targetOpacity.toFixed(3),
    garment: garment.position.toArray().map(n=>+n.toFixed(4)) };
  const lw = jointPos(hands[0],'wrist',tmpL); if(lw) frame.leftWrist = lw.toArray().map(n=>+n.toFixed(4));
  const rw = jointPos(hands[1],'wrist',tmpR); if(rw) frame.rightWrist = rw.toArray().map(n=>+n.toFixed(4));
  take.push(frame);
}
// no AR do Quest a origem é a cabeça (não o chão) — posicionamos objetos relativos à câmera
const _camPos = new THREE.Vector3(), _camDir = new THREE.Vector3(), _q = new THREE.Quaternion(), _tip = new THREE.Vector3();
function frontOfCamera(target, dist){
  const cam = renderer.xr.getCamera();
  cam.getWorldPosition(_camPos);
  cam.getWorldDirection(_camDir);
  _camDir.y = 0;
  if (_camDir.lengthSq() < 1e-4) _camDir.set(0,0,-1);
  _camDir.normalize();
  target.position.copy(_camPos).addScaledVector(_camDir, dist);
}

// fluxo: ao entrar em AR aparece o botão "Projetar"; ao tocá-lo, a camisa surge à frente
let projected = false, needsButtonPlacement = false;
function updateButton(){
  if (!projectBtn.visible) return;
  renderer.xr.getCamera().getWorldQuaternion(_q);
  projectBtn.quaternion.copy(_q);                       // encara o usuário (texto legível)
  for (const hand of hands){
    const tip = jointPos(hand, 'index-finger-tip', _tip);
    if (tip && tip.distanceTo(projectBtn.position) < 0.06){ projectGarment(); break; }
  }
}
function projectGarment(){
  frontOfCamera(garment, 0.5); garment.position.y -= 0.05;
  garment.visible = true; projectBtn.visible = false; projected = true;
}
renderer.xr.addEventListener('sessionstart', ()=>{
  take.length = 0; recording = true;
  garment.visible = false; projected = false; needsButtonPlacement = true;
});
renderer.xr.addEventListener('sessionend',   ()=>{ recording=false; stat('take pronto: '+take.length+' frames — exporte o JSON'); });

document.getElementById('exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify({fps:'variável', frames:take}, null, 0)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'take-mao.json'; a.click();
};

// ---------- desktop fallback (preview com mouse) ----------
let controls;
if (!('xr' in navigator)) {
  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0,1.3,-0.4);
}

// ---------- loop ----------
function stat(s){ document.getElementById('stat').textContent = s; }
renderer.setAnimationLoop((t)=>{
  if (renderer.xr.isPresenting){
    if (needsButtonPlacement){ frontOfCamera(projectBtn, 0.55); projectBtn.visible=true; needsButtonPlacement=false; }
    if (!projected){
      updateButton();
      stat('toque em "Projetar" com o dedo indicador');
    } else {
      updateGrab();
      stat(grabbedBy ? 'segurando · op '+targetOpacity.toFixed(2) : 'faça pinça perto da camisa');
    }
  } else if (controls){ controls.update(); }
  updateFade();
  recordFrame(t);
  renderer.render(scene, camera);
});
addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
