name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Opt-in pro Node 24 (as actions ainda embarcam Node 20, deprecado a partir de 16/06/2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

# Permite um único deploy concorrente; cancela runs antigos em fila
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publica a raiz do repo (index.html + assets/)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
